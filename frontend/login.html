<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Privado - Marca Ropa IDG</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center vh-100">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card shadow-lg border-0 rounded-3">
                    <div class="card-body p-5">
                        <h3 class="text-center mb-4 fw-bold">🔐 Acceso Admin</h3>
                        <div class="mb-3">
                            <label class="form-label text-muted">Usuario</label>
                            <input type="text" id="user" class="form-control form-control-lg" placeholder="Escribe tu usuario">
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-muted">Contraseña</label>
                            <input type="password" id="pass" class="form-control form-control-lg" placeholder="••••••••">
                        </div>
                        <button onclick="entrar()" class="btn btn-dark w-100 btn-lg">Entrar al Panel</button>
                        
                        <!-- Mensaje de error oculto por defecto -->
                        <div id="error-msg" class="alert alert-danger mt-3 d-none text-center" role="alert">
                            Usuario o contraseña incorrectos
                        </div>
                    </div>
                </div>
                <div class="text-center mt-3">
                    <a href="index.html" class="text-decoration-none text-muted">← Volver a la tienda</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        function entrar() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            
            // Usuario: admin | Contraseña: 1234
            if (u === 'admin' && p === '1234') {
                sessionStorage.setItem('logeado', 'true'); // Guardamos la llave
                window.location.href = 'admin.html'; // Te dejamos pasar
            } else {
                document.getElementById('error-msg').classList.remove('d-none'); // Mostramos error
            }
        }
    </script>
</body>
</html>
