<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Administración - Marca Ropa IDG</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <span class="navbar-brand mb-0 h1">IDG Panel de Administrador</span>
        <a href="index.html" class="btn btn-outline-light btn-sm">Volver a la Tienda</a>
    </div>
</nav>

<div class="container mt-5">
    <div class="row">
        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">Añadir Nuevo Producto</div>
                <div class="card-body">
                    <form id="form-producto">
                        <div class="mb-3">
                            <label>Nombre de la prenda</label>
                            <input type="text" id="admin-nombre" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label>Precio (€)</label>
                            <input type="number" step="0.01" id="admin-precio" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label>URL de la imagen</label>
                            <input type="text" id="admin-imagen" class="form-control" placeholder="ej: imagenes/camiseta.png" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Guardar Producto</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-header bg-dark text-white">Inventario Actual</div>
                <div class="card-body">
                    <table class="table table-striped align-middle">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>Imagen</th>
                            <th>Nombre</th>
                            <th>Precio</th>
                            <th>Acciones</th>
                        </tr>
                        </thead>
                        <tbody id="tabla-productos">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="js/admin.js"></script>
</body>
</html>
