<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Tienda de Ropa - Marca Ropa IDG</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/estilos.css?v=1.1" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark mb-5">
    <div class="container">
        <span class="navbar-brand mb-0 h1">Marca Ropa IDG</span>
    </div>
</nav>

<div class="row mb-4">
    <div class="col-md-6 mx-auto">
        <div class="input-group shadow-sm">
            <span class="input-group-text bg-white border-end-0">🔍</span>
            <input type="text" id="buscador-productos" class="form-control border-start-0" placeholder="Buscar camisetas, pantalones, chaquetas...">
        </div>
    </div>
</div>

<div class="container">
    <div class="row">
        <div class="col-md-8">
            <h3 class="mb-4">Catálogo de Productos</h3>
            <div id="catalogo" class="row">
            </div>
        </div>

        <div class="col-md-4">
            <div class="card card-carrito shadow-sm">
                <div class="card-body">
                    <h4 class="card-title-carrito">Tu Carrito</h4>
                    <ul id="lista-carrito" class="list-group mb-3">
                        <li class="list-group-item text-muted text-center">El carrito está vacío</li>
                    </ul>
                    <div id="total-carrito-container" class="d-flex justify-content-between align-items-center">
                        <span>Total:</span>
                        <strong id="total-carrito">0.00 €</strong>
                    </div>
                    <button class="btn btn-success w-100" data-bs-toggle="modal" data-bs-target="#checkoutModal">Finalizar Compra</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="checkoutModal" tabindex="-1" aria-labelledby="checkoutModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="checkoutModalLabel">💳 Finalizar Pago</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form id="formulario-pago">
          <div class="mb-3">
            <label for="nombre" class="form-label">Nombre completo</label>
            <input type="text" class="form-control" id="nombre" placeholder="Ej: Ismael Delgado García" required>
          </div>
          <div class="mb-3">
            <label for="direccion" class="form-label">Dirección de envío</label>
            <input type="text" class="form-control" id="direccion" placeholder="Calle Pepe Mendez 123" required>
          </div>
          <div class="mb-3">
            <label for="tarjeta" class="form-label">Número de tarjeta</label>
            <input type="text" class="form-control" id="tarjeta" placeholder="1234 5678 9101 1121" required>
          </div>
        </form>
      </div>
      <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" class="btn btn-success" onclick="procesarPago()">Pagar ahora</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script src="js/app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>
</html>
