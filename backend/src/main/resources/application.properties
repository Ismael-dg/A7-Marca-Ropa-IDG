# 1. NOMBRE DE LA APLICACI”N
spring.application.name=tienda_ropa

# 2. CONFIGURACI”N DE CONEXI”N A MYSQL (XAMPP)
# Usamos el puerto 3306 y tu base de datos exacta
spring.datasource.url=jdbc:mysql://localhost:3306/Marca_Ropa_IDG?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
# Usuario y contraseÒa creados en tu script SQL
spring.datasource.username=BD_admin
spring.datasource.password=BD_admin
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 3. CONFIGURACI”N DE JPA / HIBERNATE
# 'none' para que no intente crear tablas, ya que usamos las de tu phpMyAdmin
spring.jpa.hibernate.ddl-auto=none
# Muestra las consultas SQL en la consola de IntelliJ para depurar
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# 4. SOLUCI”N PARA MAY⁄SCULAS EN LINUX (UBUNTU)
# Estas dos lÌneas obligan a Spring a usar los nombres EXACTOS de tu @Table(name="PRODUCTO")
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl

# 5. EXPOSICI”N DE LA API
# Permite que el frontend acceda a los datos sin bloqueos de seguridad b·sicos
server.port=8080